name: Validate PR links

on:
  pull_request:
    paths:
      - '**.md'

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: URL and content policy
        run: |
          set -uo pipefail
          file=README.md
          fail=0
          note() { echo "POLICY FAIL: $1"; fail=1; }

          if grep -nE 'http://' "$file"; then note "plain http:// link, use https"; fi
          if grep -nE 'https?://[0-9]{1,3}(\.[0-9]{1,3}){3}' "$file"; then note "raw IP-address URL"; fi
          if grep -nEi 'https?://(bit\.ly|tinyurl\.com|t\.co|goo\.gl|ow\.ly|is\.gd|buff\.ly|rebrand\.ly|cutt\.ly|shorturl\.at|rb\.gy|lnkd\.in)/' "$file"; then note "URL shortener, submit the real destination"; fi
          if grep -nEi 'javascript:|data:text|vbscript:' "$file"; then note "dangerous URI scheme"; fi
          if grep -nE '^\* .*<[a-zA-Z/]' "$file"; then note "raw HTML in a list entry"; fi

          bad=$(grep -E '^\* \[\*\*' "$file" | grep -vE '^\* \[\*\*[^]]+\*\*: _[^]]+_\]\(https://[^) ]+\)$' || true)
          if [ -n "$bad" ]; then note "malformed entry, need: * [**Language**: _Title_](https://...)"; echo "$bad"; fi

          if [ -f .github/blocked-domains.txt ]; then
            while IFS= read -r d; do
              [ -z "$d" ] && continue
              case "$d" in \#*) continue ;; esac
              esc=$(printf '%s' "$d" | sed 's/\./\\./g')
              if grep -nEi "https?://([a-z0-9.-]+\.)?${esc}([/:?\"' ]|$)" "$file"; then note "blocked domain: $d"; fi
            done < .github/blocked-domains.txt
          fi

          if [ "$fail" -ne 0 ]; then echo "::error::URL/content policy failed"; exit 1; fi
          echo "policy passed"

      - name: Links are live
        uses: lycheeverse/lychee-action@v2
        with:
          args: --accept 200,206,403,429 --max-concurrency 8 --no-progress README.md
          fail: true
